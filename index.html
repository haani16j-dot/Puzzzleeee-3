<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Surprise ❤️</title>

<style>

body{
font-family:Arial;
background:#f8f8f8;
text-align:center;
}

h1{
margin-top:30px;
}

.gallery{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.gallery img{
width:180px;
cursor:pointer;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

#game{
display:none;
margin-top:20px;
}

#puzzle{
width:560px;
height:392px;
margin:auto;
display:grid;
grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(7,1fr);
}

.tile{
border:1px solid #ddd;
background-size:560px 392px;
}

#timer{
font-size:20px;
margin-bottom:10px;
}

#surprise{
display:none;
margin-top:30px;
}

#surprise img, video{
width:400px;
border-radius:10px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Choose a Picture ❤️</h1>

<div class="gallery">

<img src="pic1.jpg" onclick="startPuzzle('pic1.jpg')">
<img src="pic2.jpg" onclick="startPuzzle('pic2.jpg')">
<img src="pic3.jpg" onclick="startPuzzle('pic3.jpg')">
<img src="pic4.jpg" onclick="startPuzzle('pic4.jpg')">

</div>

<div id="game">

<div id="timer">Time: 0s</div>

<div id="puzzle"></div>

</div>

<div id="surprise">

<h2>Surprise For You 💕</h2>

<img src="surprise.jpg">

<!--
<video controls>
<source src="surprise.mp4">
</video>
-->

</div>

<script>

let timer=0
let interval
let cols=10
let rows=7

function startPuzzle(image){

document.querySelector(".gallery").style.display="none"
document.getElementById("game").style.display="block"

createPuzzle(image)

interval=setInterval(()=>{
timer++
document.getElementById("timer").innerText="Time: "+timer+"s"
},1000)

}

function createPuzzle(img){

let puzzle=document.getElementById("puzzle")

puzzle.innerHTML=""

let pieces=[]

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){

let tile=document.createElement("div")

tile.className="tile"

tile.style.backgroundImage=`url(${img})`

tile.style.backgroundPosition=`-${x*56}px -${y*56}px`

tile.draggable=true

tile.dataset.correct=y*cols+x

pieces.push(tile)

}
}

pieces.sort(()=>Math.random()-0.5)

pieces.forEach(p=>puzzle.appendChild(p))

enableDrag()

}

function enableDrag(){

let dragged=null

document.querySelectorAll(".tile").forEach(tile=>{

tile.addEventListener("dragstart",function(){
dragged=this
})

tile.addEventListener("dragover",function(e){
e.preventDefault()
})

tile.addEventListener("drop",function(e){

e.preventDefault()

if(dragged===this) return

let parent=this.parentNode

let draggedIndex=[...parent.children].indexOf(dragged)
let targetIndex=[...parent.children].indexOf(this)

if(draggedIndex<targetIndex){
parent.insertBefore(dragged,this.nextSibling)
}else{
parent.insertBefore(dragged,this)
}

checkSolved()

})

})

}

function checkSolved(){

let tiles=[...document.querySelectorAll(".tile")]

let solved=true

tiles.forEach((tile,i)=>{
if(tile.dataset.correct!=i){
solved=false
}
})

if(solved){

clearInterval(interval)

setTimeout(()=>{
showSurprise()
},500)

}

}

function showSurprise(){

document.getElementById("game").style.display="none"

document.getElementById("surprise").style.display="block"

confetti()

}

function confetti(){

let duration=3000
let end=Date.now()+duration

let canvas=document.createElement("canvas")

document.body.appendChild(canvas)

let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:5+Math.random()*5,
speed:2+Math.random()*3
})
}

function frame(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{
p.y+=p.speed
ctx.fillRect(p.x,p.y,p.size,p.size)
})

if(Date.now()<end){
requestAnimationFrame(frame)
}

}

frame()

}

</script>

</body>
</html>
